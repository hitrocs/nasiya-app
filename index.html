      h("div",null,h("div",{className:"text-sm text-gray-600"},(t.type==="buy"?"Nasiya (mol olindi)":"To'lov qilindi")+(t.deleted?" (o'chirilgan)":"")),h("div",{className:"text-xs text-gray-400"},fmtDate(t.date)+(t.note?" • "+t.note:""))),
      h("div",{className:"flex items-center gap-2"},h("span",{className:"font-semibold "+(t.type==="buy"?"text-indigo-600":"text-emerald-500")},(t.type==="buy"?"+":"−")+fmt(t.amount)),
        !t.deleted&&h("button",{onPointerUp:()=>setCf({type:"txn",tid:t.id}),className:"text-gray-300 no-underline"},IcTrash(16))))),
      txns.length===0&&h("div",{className:"text-center text-gray-400 py-6"},"Tarix yo'q")),
    modal&&h(AmountModal,{title:modal==="buy"?"Nasiya qo'shish":"To'lov qilish",label:modal==="buy"?"Nasiya summasi (qarz oshadi)":"To'lov summasi (qarz kamayadi)",color:modal==="buy"?"indigo":"emerald",onSubmit:(a,n)=>add(modal,a,n),onClose:()=>setModal(null)}),
    cf&&h(ConfirmModal,{title:"Amalni o'chirish",message:"Bu amal o'chirilsinmi? (tarixda iz qoladi, lekin balansdan chiqadi)",onConfirm:()=>delTxn(cf.tid),onClose:()=>setCf(null)}));
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App));
</script>
</body>
</html>
